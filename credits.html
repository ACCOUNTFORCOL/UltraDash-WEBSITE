  <style>
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; background: #003990; font-family: Arial Black, sans-serif; }
    nav {
      position: fixed; top: 0; left: 0; right: 0; height: 8vh;
      background: #1a52b0; display: flex; align-items: center;
      justify-content: center; gap: 2vw; z-index: 100; overflow: hidden;
    }
    nav a {
      color: #fff; text-decoration: none; font-size: clamp(0.7rem, 2.5vw, 1.6rem);
      font-weight: bold; font-family: Arial Black, sans-serif; letter-spacing: 0.05em;
      text-transform: uppercase; white-space: nowrap; padding: 0 1vw; cursor: pointer;
    }
    nav a:hover { color: #cce4ff; }
    .corner { position: fixed; z-index: 0; }
    .corner img { width: 100%; height: 100%; display: block; object-fit: contain; }
    .bottom-left  { bottom: 0; left: 0; width: 160px; height: 160px; }
    .bottom-right { bottom: 0; right: 0; width: 160px; height: 160px; transform: scaleX(-1); }
    @media (max-width: 768px) {
      .bottom-left, .bottom-right { width: 90px; height: 90px; }
    }
    .main {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
    }
    .btn {
      width: 260px; padding: 18px 0; background: #1a52b0; border: 2px solid #fff;
      border-radius: 12px; color: #fff; font-size: 1.1rem; font-weight: 900;
      font-family: Arial Black, sans-serif; text-align: center; cursor: pointer;
      letter-spacing: 0.04em; text-transform: uppercase; text-decoration: none; display: block;
    }
    .btn:hover { background: #2563c7; }
    .page {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100vh; gap: 40px;
    }
    .credits-row {
      display: flex; gap: 60px; align-items: flex-start;
      justify-content: center; flex-wrap: wrap;
    }
    .credit-card {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; color: #fff;
    }
    .credit-card .role {
      font-size: 1rem; font-weight: 900; text-transform: uppercase;
      letter-spacing: 0.06em; font-family: Arial Black, sans-serif;
    }
    .credit-card img.pfp {
      width: 90px; height: 90px; border-radius: 50%;
      border: 3px solid #fff; object-fit: cover;
    }
    .credit-card .username {
      font-size: 1rem; font-weight: bold; font-family: Arial, Helvetica, sans-serif;
    }
  </style>
